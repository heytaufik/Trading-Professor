<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Trading Professor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --page: #09090f;
            --panel: rgba(12, 12, 20, 0.88);
            --panel-soft: rgba(18, 18, 30, 0.92);
            --field: rgba(8, 8, 14, 0.86);
            --line: rgba(255, 255, 255, 0.12);
            --line-strong: rgba(124, 77, 255, 0.38);
            --text: #ffffff;
            --muted: #bfc0d5;
            --cyan: #00c6ff;
            --violet: #7c4dff;
            --red: #ff6b6b;
            --shadow: 0 28px 90px rgba(0, 0, 0, 0.55);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text);
            background:
                radial-gradient(circle at top left, #17172e 0%, #09090f 35%),
                radial-gradient(circle at bottom right, #0f1d35 0%, #09090f 30%);
            background-color: var(--page);
            background-attachment: fixed;
            background-repeat: no-repeat;
            overflow-x: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input {
            font: inherit;
        }

        .page {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            width: min(1180px, calc(100% - 32px));
            min-height: 74px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            color: #ffffff;
            background: linear-gradient(135deg, var(--cyan), var(--violet));
            box-shadow: 0 14px 34px rgba(124, 77, 255, 0.3);
            font-weight: 800;
        }

        .brand-text strong {
            display: block;
            font-size: 15px;
            line-height: 1.2;
        }

        .brand-text span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            margin-top: 2px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 0 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            color: #d8ded8;
            background: rgba(255, 255, 255, 0.05);
            font-size: 13px;
            font-weight: 600;
        }

        .auth-shell {
            width: min(1180px, calc(100% - 32px));
            flex: 1;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px 0 54px;
        }

        .auth-card {
            width: min(100%, 500px);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
            overflow: hidden;
            backdrop-filter: blur(18px);
        }

        .auth-head {
            padding: 26px 28px 20px;
            border-bottom: 1px solid var(--line);
            background:
                linear-gradient(135deg, rgba(0, 198, 255, 0.14), transparent 42%),
                linear-gradient(90deg, rgba(124, 77, 255, 0.16), transparent),
                var(--panel-soft);
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 24px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 32px;
            padding: 0 11px;
            border: 1px solid rgba(0, 198, 255, 0.34);
            border-radius: 999px;
            color: #d9f7ff;
            background: rgba(0, 198, 255, 0.09);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .status-pill::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 16px rgba(0, 198, 255, 0.75);
        }

        .secure-copy {
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
        }

        .auth-head h1 {
            font-size: 34px;
            line-height: 1.14;
            letter-spacing: 0;
            margin-bottom: 10px;
        }

        .auth-head p {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.65;
        }

        .auth-form {
            padding: 26px 28px 24px;
        }

        .auth-message {
            margin-bottom: 16px;
            padding: 12px 14px;
            border: 1px solid rgba(255, 107, 107, 0.36);
            border-radius: 8px;
            background: rgba(255, 107, 107, 0.12);
            color: #ffd9d9;
            font-size: 13px;
            line-height: 1.5;
        }

        .auth-message.success {
            border-color: rgba(35, 200, 107, 0.36);
            background: rgba(35, 200, 107, 0.12);
            color: #c7ffde;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            color: #f0f0ff;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .field input {
            width: 100%;
            height: 52px;
            border: 1px solid var(--line);
            border-radius: 8px;
            outline: none;
            color: var(--text);
            background: var(--field);
            padding: 0 15px;
            font-size: 15px;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .field input:focus {
            border-color: rgba(0, 198, 255, 0.72);
            box-shadow: 0 0 0 4px rgba(0, 198, 255, 0.12);
            background: rgba(12, 12, 22, 0.96);
        }

        .field input::placeholder {
            color: rgba(247, 244, 235, 0.38);
        }

        .form-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin: 2px 0 18px;
            color: var(--muted);
            font-size: 12px;
        }

        .check {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .check input {
            width: 16px;
            height: 16px;
            accent-color: var(--violet);
        }

        .form-meta span {
            color: #d9d9ea;
        }

        .submit-btn {
            width: 100%;
            min-height: 54px;
            border: 0;
            border-radius: 8px;
            color: #ffffff;
            background: linear-gradient(135deg, var(--cyan), var(--violet));
            box-shadow: 0 15px 45px rgba(124, 77, 255, 0.35);
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.18s ease, filter 0.18s ease;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
        }

        .submit-btn:disabled {
            cursor: wait;
            opacity: 0.72;
            transform: none;
        }

        .support-note {
            margin-top: 18px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
            color: var(--muted);
            text-align: center;
        }

        .trust-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-top: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.035);
        }

        .trust-item {
            min-width: 0;
            padding: 14px 10px;
            text-align: center;
            border-right: 1px solid var(--line);
        }

        .trust-item:last-child {
            border-right: 0;
        }

        .trust-item strong {
            display: block;
            font-size: 14px;
            color: var(--text);
        }

        .trust-item span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            margin-top: 4px;
        }

        @media (max-width: 980px) {
            .auth-shell {
                align-items: center;
                padding-top: 18px;
            }
        }

        @media (max-width: 560px) {
            .topbar,
            .auth-shell {
                width: min(100% - 22px, 1180px);
            }

            .topbar {
                min-height: 62px;
            }

            .brand-text span,
            .secure-copy {
                display: none;
            }

            .auth-shell {
                min-height: calc(100dvh - 62px);
                align-items: center;
                padding: 16px 0 22px;
            }

            .auth-head,
            .auth-form {
                padding: 18px;
            }

            .auth-head h1 {
                font-size: 25px;
            }

            .status-row {
                align-items: flex-start;
                flex-direction: column;
                gap: 10px;
                margin-bottom: 16px;
            }

            .form-meta {
                align-items: center;
                flex-direction: row;
                flex-wrap: wrap;
            }

            .trust-row {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .trust-item {
                padding: 11px 6px;
                border-right: 1px solid var(--line);
                border-bottom: 0;
            }

            .trust-item:last-child {
                border-right: 0;
            }

            .trust-item strong {
                font-size: 12px;
            }

            .trust-item span {
                font-size: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <header class="topbar">
            <a class="brand" href="index.html">
                <span class="brand-mark">TP</span>
                <span class="brand-text">
                    <strong>Trading Professor</strong>
                    <span>Nifty & BankNifty </span>
                </span>
            </a>

            <a class="back-link" href="index.html">Back to store</a>
        </header>

        <main class="auth-shell">
            <section class="auth-card" aria-label="Trading Professor login">
                <div class="auth-head">
                    <div class="status-row">
                        <div class="status-pill" id="sourceBadge">Member access</div>
                        <div class="secure-copy">Protected checkout</div>
                    </div>
                    

                    <h1 id="authTitle">Login to continue</h1>
                    <p id="authSubtitle">Access your premium trading resources and continue your purchase securely.</p>
                </div>

                <form
    class="auth-form"
    action="https://pages.razorpay.com/pl_SvdJo64IEEL0rK/view"
    method="get">
                    <div class="auth-message" id="authMessage" hidden></div>

                    <div class="field">
                        <label for="email">Email address</label>
                        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required>
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" type="password" placeholder="Any password" autocomplete="current-password" required>
                    </div>

                    <div class="form-meta">
                        <label class="check">
                            <input type="checkbox" checked>
                            Remember me
                        </label>
                        <span>Instant store access</span>
                    </div>

                    <button class="submit-btn" id="submitButton" type="submit">Login to continue</button>

                    
                </form>

                <div class="trust-row" aria-label="Trust points">
                    <div class="trust-item">
                        <strong>Premium</strong>
                        <span>E-book access</span>
                    </div>
                    <div class="trust-item">
                        <strong>Secure</strong>
                        <span>Store session</span>
                    </div>
                    <div class="trust-item">
                        <strong>Fast</strong>
                        <span>Checkout ready</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="login.js"></script>
</body>

</html>
